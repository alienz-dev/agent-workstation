# Agent Workstation — Pipeline Constitution

project: agent-workstation
methodology: sdd

workflow:
  states: [plan, test, sprint, review, done, failed]
  transitions:
    - from: plan
      to: test
      signal: plan_ready
      gate: spec-quality
    - from: test
      to: sprint
      signal: tests_ready
      gate: red-gate
    - from: sprint
      to: review
      signal: sprint_complete
      gate: green-gate
    - from: review
      to: done
      signal: review_complete

policies:
  information_barrier: true
  max_fix_cycles: 3
  max_children_per_parent: 3
  rate_limit_per_minute: 5

gates:
  spec-quality:
    command: "echo 'spec gate placeholder'"
    timeout: 30
  red-gate:
    command: "turbo test -- --run 2>&1 | grep -q 'FAIL'"
    timeout: 60
  green-gate:
    command: "turbo test"
    timeout: 120

roles:
  planner:
    can_spawn: [test-manager, sprint-manager, researcher]
    denied_paths: [src/]
    denied_commands: []
  test-manager:
    can_spawn: []
    denied_paths: [src/]
    denied_commands: []
  sprint-manager:
    can_spawn: [coder, reviewer-lite, reviewer]
    denied_paths: [specs/]
    denied_commands: []
  coder:
    can_spawn: []
    denied_paths: [specs/, methodology/, .agents/]
    denied_commands: [git push, rm -rf]
  reviewer:
    can_spawn: []
    denied_paths: []
    denied_commands: [git push]
