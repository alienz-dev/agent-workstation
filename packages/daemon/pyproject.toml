[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-workstation-daemon"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "aiohttp>=3.9.0",
    "click>=8.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-aiohttp>=1.0", "pytest-asyncio>=0.23.0"]

[project.scripts]
aw-daemon = "aw_daemon.main:cli"

[tool.setuptools.packages.find]
where = ["src"]
include = ["aw_daemon*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
